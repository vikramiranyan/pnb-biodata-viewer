<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PNB BioData Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="header-banner">
<h1>PNB - HO: HRD - BioData Viewer 2.0</h1>
</div>

<div class="container">

<div class="card">

<button onclick="resetFilters()">Clear Filters</button>

<div class="dropdowns">

<label>Zone:</label>
<select id="zoneSelect">
<option value="">--Select Zone--</option>
</select>

<label>Circle:</label>
<select id="circleSelect">
<option value="">--Select Circle--</option>
</select>

<label>DeptID:</label>
<select id="deptIdSelect">
<option value="">--Select DeptID--</option>
</select>

<label>Dept Name:</label>
<select id="deptNameSelect">
<option value="">--Select Dept Name--</option>
</select>

</div>

<div class="search-bar">

<label>EmplID:</label>
<input type="text" id="idSearch" placeholder="Enter EmplID">

<label>Empl_Name:</label>
<input type="text" id="nameSearch" placeholder="Enter Name">

</div>

<table id="resultTable">

<thead>
<tr>
<th>Zone</th>
<th>Circle</th>
<th>DeptID</th>
<th>Dept Name</th>
<th>EmplID</th>
<th>Empl_Name</th>
<th>Grade</th>
<th>Designation</th>
<th>View</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<div class="footer-banner">
<div class="footer-team">Developed & Maintained by PNB HRMS Team</div>
</div>

<script src="script.js"></script>

</body>
</html>
