<!DOCTYPE html>
<html>
<head>
<title>PNB Biodata Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:#f5f6fa;
margin:0;
padding:0;
}

.header{
background:#003366;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.searchbox{
padding:20px;
text-align:center;
}

input{
padding:10px;
width:300px;
font-size:16px;
}

button{
padding:10px 20px;
background:#003366;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:left;
}

.viewer{
height:500px;
margin-top:20px;
}

iframe{
width:100%;
height:100%;
border:none;
}
</style>
</head>
<body>
<div class="header">
PNB Biodata Viewer
</div>
<div class="searchbox">
<input id="search" placeholder="Search Employee ID / Name">
<button onclick="search()">Search</button>
</div>
<table id="table">
<thead>
<tr>
<th>EmplID</th>
<th>Name</th>
<th>Zone</th>
<th>Circle</th>
<th>Grade</th>
<th>View</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
<div class="viewer">
<iframe id="pdfviewer"></iframe>
</div>
<script src="script.js"></script>
</body>
</html>
